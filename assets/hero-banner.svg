<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="C Fundamentals">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1A" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>
    <style>
      .heading { font-family: 'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif; font-weight: 900; }
      .mono    { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, 'Courier New', monospace; font-weight: 700; }
    </style>
  </defs>

  <rect width="1280" height="400" fill="#FFFDF5"/>
  <rect width="1280" height="400" fill="url(#grid)"/>

  <!-- Top acid marquee -->
  <rect x="0" y="0" width="1280" height="36" fill="#CCFF00"/>
  <line x1="0" y1="36" x2="1280" y2="36" stroke="#1A1A1A" stroke-width="3"/>
  <text class="mono" x="640" y="24" text-anchor="middle" font-size="12" fill="#1A1A1A" letter-spacing="6">C11 · GCC · CLANG · POSIX · ZERO DEPENDENCIES · MIT</text>

  <!-- Eyebrow -->
  <text class="mono" x="60" y="100" font-size="13" fill="#1A1A1A" letter-spacing="6">ALGORITHMS / DATA STRUCTURES / SYSTEMS</text>

  <!-- Big name (single line because it's wide enough) -->
  <text class="heading" x="60" y="240" font-size="120" fill="#1A1A1A" letter-spacing="-6">C FUNDAMENTALS<tspan fill="#CCFF00">.</tspan></text>

  <!-- Subline -->
  <text class="mono" x="60" y="295" font-size="20" fill="#1A1A1A" letter-spacing="4">/// 5 SORTS · BINARY SEARCH · 2 CIPHERS · LINKED LIST · HASH TABLE ///</text>

  <!-- Acid corner -->
  <rect x="1080" y="80" width="140" height="140" fill="#CCFF00" stroke="#1A1A1A" stroke-width="6"/>
  <text class="mono" x="1150" y="138" text-anchor="middle" font-size="13" fill="#1A1A1A" letter-spacing="2">C11</text>
  <text class="mono" x="1150" y="158" text-anchor="middle" font-size="13" fill="#1A1A1A" letter-spacing="2">MIT</text>
  <text class="mono" x="1150" y="178" text-anchor="middle" font-size="13" fill="#1A1A1A" letter-spacing="2">0 DEPS</text>

  <!-- Bottom mono line -->
  <text class="mono" x="60" y="378" font-size="12" fill="#1A1A1A" letter-spacing="4">/// 227 TEST ASSERTIONS · 43 TEST CASES · LINUX + macOS · GCC + CLANG ///</text>
</svg>
