name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build + tests on the cross-product of {Linux, macOS} × {gcc, clang} ──
  build:
    name: ${{ matrix.os }} · ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v5

      - name: Set compiler
        run: echo "CC=${{ matrix.compiler }}" >> $GITHUB_ENV

      - name: Build all modules
        run: make all

      - name: Run unit tests
        run: make test

      - name: Run smoke tests
        run: make smoke

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.compiler }}
          path: build/
          retention-days: 7

  # ── Memory-safety pass with AddressSanitizer + UndefinedBehaviorSanitizer ──
  sanitizers:
    name: sanitizers (clang)
    runs-on: ubuntu-latest
    needs: build  # only run if the basic matrix already passed
    steps:
      - uses: actions/checkout@v5

      - name: AddressSanitizer
        run: make asan
        env:
          CC: clang

      - name: UndefinedBehaviorSanitizer
        run: make ubsan
        env:
          CC: clang
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
